<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="preload" as="image" href="/assets/ui/button-hover.png" />
    <link rel="preload" as="image" href="/assets/ui/button-press.png" />
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <title>Sqlotter</title>
  </head>
  <body class="splash-app">
    <!-- Main content -->
    <div class="splash-content">
      <!--
        Mirrors SplotMascot's resting-face stack (depth 10-65 in CLAUDE.md):
        a mask-tinted color layer stands in for the baked/tinted blob texture,
        face parts default to the same fallbacks SplotMascot uses, and the
        shine layer uses the SAME overlay blend + 50% amount as
        paintOverlayShine — not a plain translucent image. splash.ts swaps
        every layer to the player's own equipped look once /api/init resolves.
      -->
      <div class="splot-stack" id="splot-blob" aria-hidden="true">
        <div class="splot-shadow"></div>
        <div class="splot-layer splot-color" id="splot-color"></div>
        <img class="splot-layer" id="splot-mouth" src="assets/character/mouth/mouth-smile.png" alt="" />
        <img class="splot-layer" id="splot-eye" src="assets/character/eyes/eye-normal.png" alt="" />
        <img class="splot-layer" id="splot-eyebrow" src="assets/character/eyebrows/eyebrow-normal.png" alt="" />
        <img class="splot-layer splot-hidden" id="splot-accessory" src="" alt="" />
        <img class="splot-layer splot-overlay" src="assets/character/overlay-normal.png" alt="" />
        <img class="splot-layer" src="assets/character/outline.png" alt="" />
      </div>

      <img class="splash-title" src="assets/title.png" alt="Sqlotter" />
      <p class="splash-sub" id="greeting">Loading…</p>
      <p class="splash-desc" id="daily-info">Today's Sqlot is waiting!</p>
    </div>

    <div class="splash-cta">
      <button class="play-btn" id="start-button" type="button" aria-label="Open Sqlotter in expanded mode">
        <span class="play-icon"></span> Play Now
      </button>
      <p class="splash-hint">A fresh Sqlot to solve every day!</p>
    </div>

    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
