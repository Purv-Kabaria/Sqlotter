<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <title>Sqlotter</title>
  </head>
  <body class="splash-app">
    <!-- Main content -->
    <div class="splash-content">
      <div class="splot-stack" id="splot-blob" aria-hidden="true">
        <img class="splot-layer" src="assets/character/shadow.png" alt="" />
        <img class="splot-layer" src="assets/character/blob.png" alt="" />
        <img class="splot-layer" src="assets/character/mouth/mouth-happy.png" alt="" />
        <img class="splot-layer" src="assets/character/eyes/eye-normal.png" alt="" />
        <img class="splot-layer" src="assets/character/eyebrows/eyebrow-normal.png" alt="" />
        <img class="splot-layer" src="assets/character/overlay-normal.png" alt="" />
        <img class="splot-layer" src="assets/character/outline.png" alt="" />
      </div>

      <img class="splash-title" src="assets/title.png" alt="Sqlotter" />
      <p class="splash-sub" id="greeting">Loading…</p>
      <p class="splash-desc" id="daily-info">Today's puzzle is waiting!</p>
    </div>

    <div class="splash-cta">
      <button class="play-btn" id="start-button" type="button" aria-label="Open Sqlotter in expanded mode">
        <span class="play-icon"></span> Play Now
      </button>
      <p class="splash-hint">Factory Balls meets Reddit!</p>
    </div>

    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
